name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      # ---------------------------------------------------------------------
      # Быстрый gate на раннере GitHub: без .env (дефолты Zod) - тут только
      # проверяем, что код валиден и собирается. Настоящая production-сборка
      # с реальным .env происходит НА СЕРВЕРЕ в deploy/update.sh - .env там
      # персистентный и в CI не материализуется (см. deploy/README.md).
      # ---------------------------------------------------------------------
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build (gate only, не публикуется)
        run: npm run build
        env:
          NODE_ENV: production

      - name: SEO check
        run: npm run seo:check

      # ---------------------------------------------------------------------
      # Триггер уже готового deploy/update.sh на сервере (git pull → build →
      # reload caddy, см. deploy/). Только push в main / ручной запуск - PR
      # не деплоит, чужой PR не получает доступ к продакшен-серверу по SSH.
      # Доступ ci-deploy настраивается один раз через deploy/ci-setup.sh.
      # ---------------------------------------------------------------------
      - name: Trigger remote deploy
        if: github.event_name != 'pull_request'
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_REPO_PATH: ${{ secrets.DEPLOY_REPO_PATH }}
        run: |
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$DEPLOY_SSH_KEY" > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"
          ssh-keyscan -H "$DEPLOY_HOST" > "$HOME/.ssh/known_hosts" 2>/dev/null
          ssh -i "$HOME/.ssh/deploy_key" -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "sudo /bin/bash $DEPLOY_REPO_PATH/deploy/update.sh"

      - name: Health check
        if: github.event_name != 'pull_request'
        env:
          PUBLIC_DOMAIN: ${{ secrets.PUBLIC_DOMAIN }}
        run: |
          sleep 2
          curl -fsS "$PUBLIC_DOMAIN" > /dev/null
