# DotBioSite - шаблон конфига Nginx для self-hosted деплоя.
#
# Ставится автоматически через deploy/server-setup.sh (тот подставит
# __DOMAIN__ и __DEPLOY_PATH__ и включит сайт). Ручная установка:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/dotbio
#   sudo sed -i 's#__DOMAIN__#example.ru#g; s#__DEPLOY_PATH__#/var/www/dotbio#g' \
#       /etc/nginx/sites-available/dotbio
#   sudo ln -sf /etc/nginx/sites-available/dotbio /etc/nginx/sites-enabled/dotbio
#   sudo nginx -t && sudo systemctl reload nginx
#
# HTTPS-блок добавляет `certbot --nginx` автоматически (см. DEPLOY.txt) -
# в этом файле описан только HTTP-сервер до выпуска сертификата.

server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__ www.__DOMAIN__;

    root __DEPLOY_PATH__/current;
    index index.html;

    # --- security headers (зеркало public/_headers из репозитория) ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Permissions-Policy "accelerometer=(), autoplay=(), camera=(), display-capture=(), encrypted-media=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), midi=(), payment=(), publickey-credentials-get=(), usb=(), xr-spatial-tracking=()" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; img-src 'self' data: https:; font-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; form-action 'self'; upgrade-insecure-requests" always;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 512;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    # --- кэш статики (зеркало правил из public/_headers) ---
    location /_assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location /projects/ {
        add_header Cache-Control "public, max-age=604800" always;
    }

    location ~ ^/(favicon\.svg|icon-192\.svg|icon-512\.svg)$ {
        add_header Cache-Control "public, max-age=604800" always;
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "public, max-age=3600" always;
    }

    location = /sitemap.xml {
        add_header Cache-Control "public, max-age=3600" always;
    }

    location = /robots.txt {
        add_header Cache-Control "public, max-age=3600" always;
    }

    # Astro static build (directory-format): /path/ -> /path/index.html
    location / {
        try_files $uri $uri/ =404;
    }
}
