# DotBioSite - шаблон конфига Nginx для self-hosted деплоя.
#
# Ставится автоматически через deploy/server-setup.sh (тот поставит snippet
# security-заголовков, подставит __DOMAIN__ и __DEPLOY_PATH__ и включит сайт).
# Ручная установка:
#   sudo install -d /etc/nginx/snippets
#   sudo cp deploy/nginx-security-headers.conf /etc/nginx/snippets/dotbio-security-headers.conf
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/dotbio
#   sudo sed -i 's#__DOMAIN__#example.ru#g; s#__DEPLOY_PATH__#/var/www/dotbio#g' \
#       /etc/nginx/sites-available/dotbio
#   sudo ln -sf /etc/nginx/sites-available/dotbio /etc/nginx/sites-enabled/dotbio
#   sudo nginx -t && sudo systemctl reload nginx
#
# HTTPS-блок добавляет `certbot --nginx` автоматически (см. DEPLOY.txt) -
# в этом файле описан только HTTP-сервер до выпуска сертификата. После выпуска
# добавь в HTTPS-блок HSTS (certbot его сам НЕ ставит):
#   add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__ www.__DOMAIN__;

    root __DEPLOY_PATH__/current;
    index index.html;

    # не светить версию nginx в Server-заголовке и на страницах ошибок
    server_tokens off;

    # --- security headers (зеркало public/_headers) ---
    # ВАЖНО: nginx не наследует add_header в location со своими add_header,
    # поэтому этот snippet подключается ещё и в каждом кэш-location ниже.
    include /etc/nginx/snippets/dotbio-security-headers.conf;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 512;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    # --- кэш статики (зеркало правил из public/_headers) ---
    location /_assets/ {
        include /etc/nginx/snippets/dotbio-security-headers.conf;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location /projects/ {
        include /etc/nginx/snippets/dotbio-security-headers.conf;
        add_header Cache-Control "public, max-age=604800" always;
    }

    location ~ ^/(favicon\.svg|icon-192\.svg|icon-512\.svg)$ {
        include /etc/nginx/snippets/dotbio-security-headers.conf;
        add_header Cache-Control "public, max-age=604800" always;
    }

    location = /manifest.webmanifest {
        include /etc/nginx/snippets/dotbio-security-headers.conf;
        add_header Cache-Control "public, max-age=3600" always;
    }

    location = /sitemap.xml {
        include /etc/nginx/snippets/dotbio-security-headers.conf;
        add_header Cache-Control "public, max-age=3600" always;
    }

    location = /robots.txt {
        include /etc/nginx/snippets/dotbio-security-headers.conf;
        add_header Cache-Control "public, max-age=3600" always;
    }

    # Astro static build (directory-format): /path/ -> /path/index.html
    # (без своего add_header - наследует security-заголовки из server-блока)
    location / {
        try_files $uri $uri/ =404;
    }
}
