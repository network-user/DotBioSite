<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">DotMathBot project preview</title>
  <desc id="desc">A dark glass Telegram bot preview with arithmetic cards, progress, and leaderboard cues.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#060606"/>
      <stop offset="0.5" stop-color="#17130a"/>
      <stop offset="1" stop-color="#100d08"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="18%" r="62%">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.3"/>
      <stop offset="0.5" stop-color="#fbbf24" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="34" stdDeviation="38" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="0.4" stop-color="#ffffff" stop-opacity="0.035"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.012"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>
  <g opacity="0.11" stroke="#ffffff" stroke-width="1">
    <path d="M0 180 H1600M0 300 H1600M0 420 H1600M0 540 H1600M0 660 H1600M0 780 H1600"/>
    <path d="M160 0 V900M320 0 V900M480 0 V900M640 0 V900M800 0 V900M960 0 V900M1120 0 V900M1280 0 V900M1440 0 V900"/>
  </g>
  <g filter="url(#softShadow)">
