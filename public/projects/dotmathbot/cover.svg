      <circle cx="1234" cy="242" r="9"/>
      <circle cx="1268" cy="242" r="9" opacity="0.62"/>
      <circle cx="1302" cy="242" r="9" opacity="0.32"/>
      <rect x="1198" y="431" width="104" height="18" rx="9" opacity="0.86"/>
      <rect x="1198" y="461" width="66" height="18" rx="9" opacity="0.44"/>
      <path d="M1206 674 h110" stroke="#fbbf24" stroke-width="14" stroke-linecap="round"/>
      <path d="M1206 708 h72" stroke="#fbbf24" stroke-width="14" stroke-linecap="round" opacity="0.48"/>
