    <text x="148" y="840" font-size="58" fill="#ffffff" font-weight="800">Telegram math trainer</text>
    <text x="148" y="878" font-size="22" fill="#a3a3a3">3 difficulty levels, 4 practice modes, bilingual flow</text>
