    <rect x="176" y="146" width="414" height="608" rx="30" fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.08"/>
    <rect x="220" y="188" width="102" height="16" rx="8" fill="#ffffff" fill-opacity="0.72"/>
    <rect x="220" y="220" width="242" height="10" rx="5" fill="#ffffff" fill-opacity="0.18"/>
    <rect x="220" y="286" width="326" height="150" rx="30" fill="#fbbf24" fill-opacity="0.1" stroke="#fbbf24" stroke-opacity="0.3"/>
