      <text x="54" y="38" font-size="28" font-weight="800" fill="#111111">56</text>
      <rect x="176" y="0" width="150" height="58" rx="18" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.18"/>
      <text x="230" y="38" font-size="28" font-weight="800" fill="#ffffff">54</text>
      <rect x="0" y="82" width="150" height="58" rx="18" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.18"/>
      <text x="54" y="120" font-size="28" font-weight="800" fill="#ffffff">64</text>
      <rect x="176" y="82" width="150" height="58" rx="18" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.18"/>
      <text x="230" y="120" font-size="28" font-weight="800" fill="#ffffff">48</text>
    </g>
    <rect x="220" y="684" width="326" height="12" rx="6" fill="#ffffff" fill-opacity="0.12"/>
    <rect x="220" y="684" width="214" height="12" rx="6" fill="#fbbf24" fill-opacity="0.8"/>
