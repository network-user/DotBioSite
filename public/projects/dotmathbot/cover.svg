    <rect x="790" y="368" width="520" height="164" rx="32" fill="#101010" stroke="#ffffff" stroke-opacity="0.13"/>
    <rect x="790" y="576" width="520" height="164" rx="32" fill="#101010" stroke="#ffffff" stroke-opacity="0.13"/>
